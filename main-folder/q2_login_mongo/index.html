<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        .box {
            background: white;
            padding: 20px;
            width: 250px;
            margin: auto;
            margin-top: 100px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }

        button {
            padding: 10px;
            background: #1e3a8a;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="loginUser()">Login</button>
</div>

<script>
function loginUser() {

    let usernameInput = document.getElementById("username").value;
    let passwordInput = document.getElementById("password").value;

    // FETCH API (AJAX)
    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: usernameInput,
            password: passwordInput
        })
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
    });
}
</script>

</body>
</html>
