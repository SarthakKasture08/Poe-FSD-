<!DOCTYPE html>
<html>
<head>
    <title>AJAX XML</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }

        h2 {
            color: #1e3a8a;
        }

        button {
            padding: 10px 20px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #3749c4;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        th {
            background: #1e3a8a;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

<h2>Employee Data</h2>

<button onclick="loadData()">Load Data</button>

<table id="table">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>DOB</th>
        <th>Start Date</th>
        <th>Salary</th>
    </tr>
</table>

<script>
function loadData() {

    let xhttp = new XMLHttpRequest();

    xhttp.open("GET", "data.xml", true);

    xhttp.onreadystatechange = function () {

        if (this.readyState == 4 && this.status == 200) {

            let xmlDoc = this.responseXML;
            let employees = xmlDoc.getElementsByTagName("employee");
            let table = document.getElementById("table");

            // Clear old rows (important if clicked multiple times)
            table.innerHTML = `
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>DOB</th>
                    <th>Start Date</th>
                    <th>Salary</th>
                </tr>
            `;

            for (let i = 0; i < employees.length; i++) {

                let row = table.insertRow();

                let id = employees[i].getElementsByTagName("id")[0].childNodes[0].nodeValue;
                let name = employees[i].getElementsByTagName("name")[0].childNodes[0].nodeValue;
                let dob = employees[i].getElementsByTagName("dob")[0].childNodes[0].nodeValue;
                let start = employees[i].getElementsByTagName("start-date")[0].childNodes[0].nodeValue;
                let salary = employees[i].getElementsByTagName("salary")[0].childNodes[0].nodeValue;

                row.insertCell(0).innerHTML = id;
                row.insertCell(1).innerHTML = name;
                row.insertCell(2).innerHTML = dob;
                row.insertCell(3).innerHTML = start;
                row.insertCell(4).innerHTML = salary;
            }
        }
    };

    xhttp.send();
}
</script>

</body>
</html>
