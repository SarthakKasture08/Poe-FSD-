<!DOCTYPE html>
<html>
<head>
    <title>E-PASS Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>E-PASS Registration</h2>

<form onsubmit="return validateForm()">

    <input type="text" id="name" placeholder="Full Name"><br>

    <input type="text" id="phone" placeholder="Contact Number"><br>

    <input type="email" id="email" placeholder="Email"><br>

    <textarea id="address" placeholder="Address"></textarea><br>

    <input type="text" id="source" placeholder="Source"><br>

    <input type="text" id="destination" placeholder="Destination"><br>

    <input type="text" id="vehicle" placeholder="Vehicle Number"><br>

    <input type="date" id="date"><br>

    <button type="submit">Submit</button>
    <button type="reset">Clear</button>

</form>

<script src="script.js"></script>

</body>
</html>
